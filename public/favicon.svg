  <path d="M30,52 Q18,30 30,8 Q42,30 30,52Z" fill="rgba(196,136,12,.35)" stroke="#e8b418" stroke-width="1.2" transform="rotate(144,30,30)"/>
  <path d="M30,52 Q18,30 30,8 Q42,30 30,52Z" fill="rgba(196,136,12,.35)" stroke="#e8b418" stroke-width="1.2" transform="rotate(216,30,30)"/>
  <path d="M30,52 Q18,30 30,8 Q42,30 30,52Z" fill="rgba(196,136,12,.35)" stroke="#e8b418" stroke-width="1.2" transform="rotate(288,30,30)"/>
